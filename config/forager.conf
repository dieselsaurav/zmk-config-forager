CONFIG_ZMK_POINTING=y
CONFIG_ZMK_KEYBOARD_NAME="forager_sk"

# Tolerate stale GATT subscription state from the host after it sleeps —
# without this, macOS 26.5.2 fails to reconnect after wake until Bluetooth
# is toggled. The Corne config has this set and reconnects fine on the same
# Mac; same-shaped fix as the known Windows battery-report workaround.
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# Deep sleep, mirroring the known-good Corne config: idle after 10 min,
# deep sleep after 15 min. Fresh advertising on wake is the other candidate
# for why the Corne survives macOS sleep/wake where the Forager didn't.
# The keypress that wakes a deep-sleeping half is not sent to the host.
CONFIG_ZMK_IDLE_TIMEOUT=600000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
